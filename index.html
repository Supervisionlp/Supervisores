  pendiente: { label: "A seguir", color: "var(--pending)" },
  incidencia: { label: "Incidencia", color: "var(--alert)" },

function estadoVisita(v) {
  const checks = CHECK_FIELDS.map(([k]) => v[k]).filter(Boolean);
  if (checks.some((c) => c === "No")) return "incidencia";
  const cal = parseFloat(v.calificacion);
  if (!isNaN(cal) && cal <= 2) return "incidencia";
  if (!isNaN(cal) && cal === 3) return "pendiente";
  return "completado";
}

// Cálculo de costo por km basado en parámetros fijos
function calcCostoKm(precioCombustible) {
  const combustible = 0.14 * precioCombustible;
  const mantenimiento = 300000 / 5000; // 60 Gs/km
  const cubiertas = 400000 / 40000;    // 10 Gs/km
  const desgaste = combustible * 0.10; // 10% del combustible
  return Math.round(combustible + mantenimiento + cubiertas + desgaste);
}
// Obtener número de local desde nombre ("01 - Sajonia" → "1")
function getNumLocal(nombre) {
  if (!nombre) return null;
  const m = nombre.match(/^(\d+)/);
  return m ? String(parseInt(m[1])) : null;
}

// Obtener KM entre dos locales (o supervisor → local)
function getKmEntre(origenId, destinoId, locales, supervisor) {
  const getKey = (id) => {
    if (!id) return null;
    const local = locales.find((l) => l.id === id);
    return local ? getNumLocal(local.nombre) : null;
  };
  const dest = getKey(destinoId);
  if (!dest) return 0;
  // Origen: si es null, usar casa del supervisor
  let orig;
  if (!origenId) {
    orig = supervisor?.includes("Ernesto") ? "Sup1" : "Sup2";
  } else {
    orig = getKey(origenId);
  }
  if (!orig) return 0;
  return MATRIZ_KM[orig]?.[dest] || MATRIZ_KM[dest]?.[orig] || 0;
}

function getOrCreateLocalId(numLocal, locales) {
  // Buscar en locales existentes
  const found = locales.find((l) => String(parseInt(l.nombre.split(" - ")[0].trim())) === numLocal);
  if (found) return found.id;
  // Buscar en LOCALES_FIJOS y crear ID temporal
  const nombre = LOCALES_FIJOS.find((n) => String(parseInt(n.split(" - ")[0].trim())) === numLocal);
  if (nombre) return "local-" + numLocal;
  return null;
}

async function cargarCodigosSheets(locales) {
  return procesarCodigos(CODIGOS_DATA, locales);
}

function procesarCodigos(items, locales) {
  const codigos = [];
  for (const item of items) {
    if (!item.codigo || item.numLocal === "NaN") continue;
    // Buscar local en Firestore
    let localObj = locales.find((l) => String(parseInt(l.nombre.split(" - ")[0].trim())) === item.numLocal);
    // Si no existe, buscar en LOCALES_FIJOS
    if (!localObj) {
      const nombre = LOCALES_FIJOS.find((n) => String(parseInt(n.split(" - ")[0].trim())) === item.numLocal);
      if (nombre) localObj = { id: "local-" + item.numLocal, nombre };
    }
    if (!localObj) continue;
    codigos.push({ id: uid(), localId: localObj.id, codigo: item.codigo, descripcion: item.descripcion, probado: false, fechaCarga: todayISO() });
  }
  return codigos;
}

/* ---- Firestore helpers ---- */
async function loadData() {
  try {
    const [locSnap, visSnap, tarSnap, codSnap, rutSnap, cfgSnap] = await Promise.all([
      db.collection("locales").get(),
      db.collection("visitas").get(),
      db.collection("tareas").get(),
      db.collection("codigos").get(),
      db.collection("rutas").get(),
      db.collection("config").doc("main").get(),
    ]);
    const cfg = cfgSnap.exists ? cfgSnap.data() : {};
    const localesData = locSnap.docs.map((d) => ({ id: d.id, ...d.data() }));
    // Cargar inventarios y códigos desde Google Sheets (sin bloquear si falla)
    const [inventariosSheets, codigosSheets] = await Promise.all([
      cargarInventariosSheets().catch(() => []),
      cargarCodigosSheets(localesData).catch(() => []),
    ]);
    // Mergear códigos: los de Firestore (con estado probado) + los nuevos de Sheets
    // Crear locales faltantes en Firestore para que los códigos tengan IDs reales
    const localesMap = {};
    localesData.forEach((l) => {
      const num = String(parseInt(l.nombre.split(" - ")[0].trim()));
      localesMap[num] = l;
    });
    // Para locales que no existen en Firestore, crearlos
    const localesBatch = [];
    LOCALES_FIJOS.forEach((nombre) => {
      const num = String(parseInt(nombre.split(" - ")[0].trim()));
      if (!localesMap[num]) {
        const newLocal = { id: "local-fixed-" + num, nombre };
        localesMap[num] = newLocal;
        localesBatch.push(newLocal);
      }
    });
    const localesCompletos = [...localesData, ...localesBatch];

    // Procesar códigos con IDs reales
    const codigosSheetsFinal = procesarCodigos(CODIGOS_DATA, localesCompletos);
    const codFirestore = codSnap.docs.map((d) => ({ id: d.id, ...d.data() }));
    const codFirestoreKeys = new Set(codFirestore.map((c) => c.localId + "|" + c.codigo));
    const codNuevos = codigosSheetsFinal.filter((c) => !codFirestoreKeys.has(c.localId + "|" + c.codigo));
    return {
      locales: localesCompletos,
      visitas: visSnap.docs.map((d) => ({ id: d.id, ...d.data() })),
      tareas: tarSnap.docs.map((d) => ({ id: d.id, ...d.data() })),
      codigos: [...codFirestore, ...codNuevos],
      rutas: rutSnap.docs.map((d) => ({ id: d.id, ...d.data() })),
      inventarios: inventariosSheets.length > 0 ? inventariosSheets : (cfg.inventarios || []),
      precioCombustible: cfg.precioCombustible || 6860,
    };
  } catch (err) { console.error("loadData:", err); return EMPTY; }
}

async function saveData(prev, next) {
  try {
    const batch = db.batch();
    const prevLocalIds = new Set((prev?.locales||[]).map((l) => l.id));
    for (const l of next.locales) {
      if (!prevLocalIds.has(l.id)) batch.set(db.collection("locales").doc(l.id), { nombre: l.nombre });
    }
    const prevVisMap = {};
    (prev?.visitas||[]).forEach((v) => { prevVisMap[v.id] = v; });
    for (const v of next.visitas) {
      const { id, ...rest } = v;
      if (!prevVisMap[id]) batch.set(db.collection("visitas").doc(id), rest);
      else if (v.quejasResueltas !== prevVisMap[id].quejasResueltas || v.infraResuelta !== prevVisMap[id].infraResuelta) {
        batch.update(db.collection("visitas").doc(id), { quejasResueltas: v.quejasResueltas, infraResuelta: v.infraResuelta });
      }
    }
    const prevTarMap = {};
    (prev?.tareas||[]).forEach((t) => { prevTarMap[t.id] = t; });
    for (const t of next.tareas) {
      const { id, ...rest } = t;
      if (!prevTarMap[id]) batch.set(db.collection("tareas").doc(id), rest);
      else if (t.hecha && !prevTarMap[id].hecha) batch.update(db.collection("tareas").doc(id), { hecha: true });
    }
    const prevCodMap = {};
    (prev?.codigos||[]).forEach((c) => { prevCodMap[c.id] = c; });
    const nextCodIds = new Set(next.codigos.map((c) => c.id));
    for (const c of (prev?.codigos||[])) {
      if (!nextCodIds.has(c.id)) batch.delete(db.collection("codigos").doc(c.id));
    }
    for (const c of next.codigos) {
      const { id, ...rest } = c;
      if (!prevCodMap[id]) batch.set(db.collection("codigos").doc(id), rest);
      else if (c.probado && !prevCodMap[id].probado) batch.update(db.collection("codigos").doc(id), { probado: true, resultado: c.resultado, detalleFalla: c.detalleFalla||"", fechaProbado: c.fechaProbado });
    }
    const prevRutMap = {};
    (prev?.rutas||[]).forEach((r) => { prevRutMap[r.id] = r; });
    for (const r of (next.rutas||[])) {
      const { id, ...rest } = r;
      if (!prevRutMap[id]) batch.set(db.collection("rutas").doc(id), rest);
    }
    for (const r of (prev?.rutas||[])) {
      if (!(next.rutas||[]).find((x) => x.id === r.id)) batch.delete(db.collection("rutas").doc(r.id));
    }
    await batch.commit();
    const cfgChanged = JSON.stringify(next.inventarios) !== JSON.stringify(prev?.inventarios) || next.precioCombustible !== prev?.precioCombustible;
    if (cfgChanged) await db.collection("config").doc("main").set({ inventarios: next.inventarios||[], precioCombustible: next.precioCombustible||6860 }, { merge: true });
  } catch (err) { console.error("saveData:", err); }
}

          <div className="dash-alerta-titulo">⚠ Alertas activas</div>

                <div className="dash-alerta-num">{quejasPend.length}</div>
                <div className="dash-alerta-label">Quejas pendientes</div>
                <div className="dim small" style={{ marginTop:4 }}>
                  {quejasPend.slice(0,2).map((v,i) => (
                    <div key={i}>{locales.find((l)=>l.id===v.localId)?.nombre?.split(" - ")[1] || v.localId}</div>
                  ))}
                  {quejasPend.length > 2 && <div>+{quejasPend.length-2} más</div>}
                </div>
              </div>
            )}
            {infraPend.length > 0 && (
              <div className="dash-alerta-card alerta-naranja">
                <div className="dash-alerta-num">{infraPend.length}</div>
                <div className="dash-alerta-label">Infraestructura pendiente</div>
                <div className="dim small" style={{ marginTop:4 }}>
                  {infraPend.slice(0,2).map((v,i) => (
                    <div key={i}>{locales.find((l)=>l.id===v.localId)?.nombre?.split(" - ")[1] || v.localId}</div>
                  ))}
                  {infraPend.length > 2 && <div>+{infraPend.length-2} más</div>}
                </div>
              </div>
            )}
            {competenciaNueva.length > 0 && (
              <div className="dash-alerta-card alerta-azul">
                <div className="dash-alerta-num">{competenciaNueva.length}</div>
                <div className="dash-alerta-label">Competencia detectada</div>
                <div className="dim small" style={{ marginTop:4 }}>
                  {competenciaNueva.slice(0,2).map((v,i) => (
                    <div key={i}>{locales.find((l)=>l.id===v.localId)?.nombre?.split(" - ")[1] || v.localId}</div>
                  ))}
                  {competenciaNueva.length > 2 && <div>+{competenciaNueva.length-2} más</div>}
                </div>
              </div>
            )}
          </div>
        </div>
      )}

      {/* 2. CUMPLIMIENTO DE RUTA */}
      <div className="dash-panel">
        <div className="dash-panel-title">Cumplimiento de ruta — {nombreMes(mesFiltro)}</div>
        <div className="dash-grid2" style={{ marginBottom:0 }}>
          {cumplimientoRuta.filter(({ sup }) => filtroSup === "todos" || sup === filtroSup.split(" ")[0]).map(({ sup, total, visitados, pct }) => (
            <div key={sup}>
              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6 }}>
                <span style={{ fontWeight:600 }}>{sup}</span>
                <span className="mono" style={{ color: pct>=80?"var(--done)":pct>=50?"var(--pending)":"var(--alert)" }}>{pct}%</span>
              </div>
              <div style={{ height:10, background:"var(--line)", borderRadius:5, overflow:"hidden", marginBottom:4 }}>
                <div style={{ height:"100%", width:`${pct}%`, background: pct>=80?"var(--done)":pct>=50?"var(--pending)":"var(--alert)", borderRadius:5, transition:"width .4s" }}/>
              </div>
              <div className="dim small">{visitados} de {total} locales visitados</div>
            </div>
          ))}
          {cumplimientoRuta.every((c) => c.total === 0) && (
            <div className="dim small" style={{ gridColumn:"1/-1" }}>Sin rutas asignadas para este período.</div>
          )}
        </div>
      </div>

      {/* 3. CHECKLIST DE CALIDAD */}
      {checkCalidad.length > 0 && (
        <div className="dash-panel">
          <div className="dash-panel-title">Calidad operativa — % de cumplimiento</div>
          <div className="calidad-grid">
            {checkCalidad.map(({ key, label, pct, ok, total }) => {
              const color = pct>=80?"var(--done)":pct>=50?"var(--pending)":"var(--alert)";
              return (
                <div key={key} className="calidad-card" style={{ borderTop:`3px solid ${color}` }}>
                  <div className="calidad-pct mono" style={{ color }}>{pct}%</div>
                  <div className="calidad-label">{label}</div>
                  <div className="calidad-detalle dim small">{ok} de {total} visitas</div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* 4. ENCARGADOS */}
      <div className="dash-grid2">
        <div className="dash-panel">
          <div className="dash-panel-title">Encargados — {nombreMes(mesFiltro)}</div>
          <div className="dash-stats" style={{ gridTemplateColumns:"1fr 1fr", marginBottom:0 }}>
            <div className="dash-card small">
              <div className="dash-card-label">CAPACITACIONES</div>
              <div className="dash-card-num small-num" style={{ color:"var(--done)" }}>{capacitaciones}</div>
            </div>
            <div className="dash-card small">
              <div className="dash-card-label">SIN PROACTIVIDAD</div>
              <div className="dash-card-num small-num" style={{ color: sinProactividad>0?"var(--alert)":"var(--ink)" }}>{sinProactividad}</div>
            </div>
          </div>
          {totalEncargados > 0 && (
            <div style={{ marginTop:12 }}>
              <div className="dim small" style={{ marginBottom:4 }}>Proactividad comercial</div>
              <div style={{ height:8, background:"var(--line)", borderRadius:4, overflow:"hidden" }}>
                <div style={{ height:"100%", width:`${Math.round((conProactividad/totalEncargados)*100)}%`, background:"var(--done)", borderRadius:4 }}/>
              </div>
              <div className="dim small" style={{ marginTop:4 }}>{conProactividad} de {totalEncargados} visitas con buena proactividad</div>
            </div>
          )}
        </div>

        <div className="dash-panel">
          <div className="dash-panel-title">Últimas alertas</div>
          <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
            {[...quejasPend.slice(0,2).map((v) => ({ tipo:"Queja", local: locales.find((l)=>l.id===v.localId)?.nombre, fecha:v.fecha, color:"var(--alert)" })),
              ...infraPend.slice(0,2).map((v) => ({ tipo:"Infraestructura", local: locales.find((l)=>l.id===v.localId)?.nombre, fecha:v.fecha, color:"var(--pending)" }))
            ].slice(0,4).map((a, i) => (
              <div key={i} style={{ display:"flex", gap:8, alignItems:"flex-start", fontSize:13 }}>
                <span style={{ width:8, height:8, borderRadius:"50%", background:a.color, flexShrink:0, marginTop:4 }}/>
                <div>
                  <span style={{ fontWeight:600, color:a.color }}>{a.tipo}</span>
                  <span className="dim"> — {a.local?.split(" - ").slice(1).join(" - ")}</span>
                  <div className="mono dim small">{a.fecha ? fmt(a.fecha) : ""}</div>
                </div>
              </div>
            ))}
            {quejasPend.length === 0 && infraPend.length === 0 && (
              <div className="dim small">Sin alertas pendientes</div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}


function CheckItem({ fieldKey, label, conAccion, accionLabel, invertido, checks, acciones, setChecks, setAcciones }) {
  const val = checks[fieldKey] || "";
  // invertido=true: muestra campo cuando es "Si" (ej: "Se detectaron desvíos")
  const mostrarCampo = conAccion && (invertido ? val === "Si" : val === "No");
  return (
    <div className="check-item">
      <div className="check-item-head">
        <span className="check-item-label">{label}</span>
        <div className="yesno-pills">
          {["Si","No"].map((opt) => (
            <button key={opt} type="button"
              className={"pill"+(val===opt?(opt==="No"?" pill-no":" pill-si"):"")}
              onClick={() => setChecks((prev) => ({ ...prev, [fieldKey]: prev[fieldKey]===opt?"":opt }))}>
              {opt === "Si" ? "✔" : "✖"}
            </button>
          ))}
        </div>
      </div>
      {mostrarCampo && (
        <textarea key={fieldKey+"-accion"} className="input" rows={2} style={{ marginTop:6, fontSize:12.5 }}
          placeholder={accionLabel || "Acción correctiva / Plazo"}
          defaultValue={acciones[fieldKey] || ""}
          onBlur={(e) => setAcciones((prev) => ({ ...prev, [fieldKey]: e.target.value }))} />
      )}
    </div>
  );
}

/* ---- Nuevo Recorrido ---- */
function NuevoRecorrido({ data, onSave, onDone, localPrecargado, esAdicional, supervisorFijo }) {
  const { locales, tareas, visitas, codigos } = data;
  const DRAFT_KEY = "rec-draft-global"; // Solo para el useEffect inicial

  // Estados del formulario
  const [localId, setLocalId] = useState(null);
  const [saving, setSaving] = useState(false);
  const [searchAdicional, setSearchAdicional] = useState("");
  const [cambiando, setCambiando] = useState(false);
  const [horaLlegada, setHoraLlegada] = useState("");
  const [supervisor, setSupervisor] = useState(supervisorFijo || "");
  const [checks, setChecks] = useState({});
  const [acciones, setAcciones] = useState({}); // acción correctiva por ítem
  const [observacionComercial, setObservacionComercial] = useState("");
  const [capacitacionDada, setCapacitacionDada] = useState("");
  const [temaCapacitacion, setTemaCapacitacion] = useState("");
  const [competencia, setCompetencia] = useState("");
  const [incidencias, setIncidencias] = useState("");
  const [infraestructura, setInfraestructura] = useState("");
  const [oportunidadMejora, setOportunidadMejora] = useState("");
  const [aspectoPositivo, setAspectoPositivo] = useState("");
  const [compromiso, setCompromiso] = useState("");
  const [nuevasTareas, setNuevasTareas] = useState([""]);
  const [resultadosCodigos, setResultadosCodigos] = useState({});
  const [checkedDone, setCheckedDone] = useState({});
  const [quejasResueltasCheck, setQuejasResueltasCheck] = useState(false);
  const [infraResueltaCheck, setInfraResueltaCheck] = useState(false);
  const [infraChecks, setInfraChecks] = useState({});
  const [quejasChecks, setQuejasChecks] = useState({});
  const [guardado, setGuardado] = useState(false);

  // Cargar borrador al montar
  // El borrador se carga cuando se selecciona un local (ver useEffect de localPrecargado)

  // Cargar local precargado
  useEffect(() => {
    if (localPrecargado && !localId && !cambiando) {
      const local = locales.find((l) => l.id === localPrecargado);
      if (local) {
        // Limpiar estados del formulario para el nuevo local
        setChecks({}); setAcciones({}); setObservacionComercial("");
        setCapacitacionDada(""); setTemaCapacitacion(""); setCompetencia("");
        setIncidencias(""); setInfraestructura(""); setNuevasTareas([""]);
        setOportunidadMejora(""); setAspectoPositivo(""); setCompromiso("");
        setResultadosCodigos({}); setCheckedDone({});
        setQuejasResueltasCheck(false); setInfraResueltaCheck(false);
        setInfraChecks({}); setQuejasChecks({});
        // Cargar borrador específico de este local si existe
        try {
          const draft = JSON.parse(localStorage.getItem("rec-draft-" + local.id) || "null");
          if (draft) {
            if (draft.supervisor) setSupervisor(draft.supervisor);
            if (draft.checks) setChecks(draft.checks);
            if (draft.acciones) setAcciones(draft.acciones);
            if (draft.observacionComercial) setObservacionComercial(draft.observacionComercial);
            if (draft.capacitacionDada) setCapacitacionDada(draft.capacitacionDada);
            if (draft.temaCapacitacion) setTemaCapacitacion(draft.temaCapacitacion);
            if (draft.oportunidadMejora) setOportunidadMejora(draft.oportunidadMejora);
            if (draft.aspectoPositivo) setAspectoPositivo(draft.aspectoPositivo);
            if (draft.compromiso) setCompromiso(draft.compromiso);
          }
        } catch {}
        setLocalId(local.id);
        const ahora = new Date();
        setHoraLlegada(ahora.toLocaleTimeString("es-ES", { hour:"2-digit", minute:"2-digit" }));
      }
    }
  }, [localPrecargado, cambiando]);

  // Guardar borrador automáticamente
  useEffect(() => {
    const draft = { supervisor, checks, acciones, observacionComercial, capacitacionDada, temaCapacitacion, competencia, incidencias, infraestructura, nuevasTareas, localId };
    localStorage.setItem(DRAFT_KEY, JSON.stringify(draft));
  }, [supervisor, checks, acciones, observacionComercial, capacitacionDada, temaCapacitacion, competencia, incidencias, infraestructura, nuevasTareas, localId]);

  const selectedLocal = locales.find((l) => l.id === localId);

  // Todas las tareas pendientes del local (no solo la última)
  const tareasPendientes = useMemo(
    () => tareas.filter((t) => t.localId === localId && !t.hecha),
    [tareas, localId]
  );

  const codigosDelLocal = useMemo(
    () => (codigos || []).filter((c) => c.localId === localId && !c.probado),
    [codigos, localId]
  );

  // Última visita al local
  const ultimaVisita = useMemo(() => {
    return visitas.filter((v) => v.localId === localId).sort((a,b) => a.fecha < b.fecha ? 1 : -1)[0] || null;
  }, [visitas, localId]);

  const resetForm = () => {
    setLocalId(null); setChecks({}); setAcciones({}); setObservacionComercial("");
    setCapacitacionDada(""); setTemaCapacitacion(""); setCompetencia("");
    setIncidencias(""); setInfraestructura(""); setNuevasTareas([""]);
    setResultadosCodigos({}); setCheckedDone({}); setHoraLlegada("");
    setQuejasResueltasCheck(false); setInfraResueltaCheck(false);
    setInfraChecks({}); setQuejasChecks({});
    setCambiando(false);
    if (localId) localStorage.removeItem("rec-draft-" + localId);
  };

  const submit = async () => {
    if (!localId || !supervisor.trim() || saving) return;
    setSaving(true);
    try {
      // Recalcular km total del día incluyendo esta visita nueva
      const visitasHoyOrdenadas = [...data.visitas
        .filter((v) => v.supervisor === supervisor.trim() && v.fecha === todayISO())
        .sort((a,b) => (a.horaLlegada||"00:00") < (b.horaLlegada||"00:00") ? -1 : 1),
        { localId } // agregar la visita actual al final
      ];

      // Calcular tramos: Casa → L1 → L2 → ... → Ln → Oficina
      const calcKmDia = (visitasOrdenadas, localesArr, sup) => {
        let total = 0;
        let prevId = null; // null = casa del supervisor
        for (const v of visitasOrdenadas) {
          total += getKmEntre(prevId, v.localId, localesArr, sup);
          prevId = v.localId;
        }
        // Agregar regreso a oficina desde el último local
        const ultimoNum = getNumLocal(localesArr.find((l) => l.id === prevId)?.nombre || "");
        if (ultimoNum) total += MATRIZ_KM[ultimoNum]?.["of"] || MATRIZ_KM["of"]?.[ultimoNum] || 0;
        return Math.round(total * 10) / 10;
      };

      // Incluir el local actual en la lista de locales para el cálculo
      // Asegurar que el local actual esté en la lista con su nombre correcto
      const localActualNombre = data.locales.find((l) => l.id === localId)?.nombre || 
        LOCALES_FIJOS.find((n) => { const l = data.locales.find((x) => x.id === localId); return l && l.nombre === n; }) || "";
      const localesParaCalc = data.locales.find((l) => l.id === localId)
        ? data.locales
        : [...data.locales, { id: localId, nombre: localActualNombre }];
      // Usar el nombre del local actual directamente para el cálculo
      const nombreParaCalc = selectedLocal?.nombre || localesParaCalc.find((l) => l.id === localId)?.nombre || "";
      const localesCompletos = localesParaCalc.some((l) => l.id === localId)
        ? localesParaCalc
        : [...localesParaCalc, { id: localId, nombre: nombreParaCalc }];
      const kmDiaTotal = calcKmDia(visitasHoyOrdenadas, localesCompletos, supervisor.trim());
      console.log("KM Debug2:", { kmDiaTotal, nombreParaCalc, ids: visitasHoyOrdenadas.map(v=>v.localId), nombres: localesCompletos.map(l=>l.nombre) });
      // Descontar of→casa (distancia que paga el supervisor), tomada de la matriz
      const supKey = supervisor.trim().includes("Ernesto") ? "Sup1" : "Sup2";
      const kmCasaOficina = MATRIZ_KM["of"]?.[supKey] || 0;
      const kmNeto = Math.max(0, Math.round((kmDiaTotal - kmCasaOficina) * 10) / 10);
      const kmVisita = kmNeto; // km neto (reconocido)
      const kmBruto = kmDiaTotal; // km total recorrido

      const visita = {
        id: uid(), fecha: todayISO(), horaLlegada, supervisor: supervisor.trim(), localId, kmRecorridos: kmNeto, kmBruto: kmBruto,
        arqueoCaja: checks.arqueoCaja || "", localLimpio: checks.localLimpio || "",
        depositoOrdenado: checks.depositoOrdenado || "",
        preciosVisibles: checks.preciosVisibles || "", carteleria: checks.carteleria || "",
        encargadoUniformado: checks.encargadoUniformado || "",
        proactividadComercial: checks.proactividadComercial || "",
        accionArqueoCaja: acciones.arqueoCaja || "",
        accionLocalLimpio: acciones.localLimpio || "",
        accionDepositoOrdenado: acciones.depositoOrdenado || "",
        accionPreciosVisibles: acciones.preciosVisibles || "",
        accionCarteleria: acciones.carteleria || "",
        accionEncargadoUniformado: acciones.encargadoUniformado || "",
        accionProactividadComercial: acciones.proactividadComercial || "",
        observacionComercial: observacionComercial.trim(),
        oportunidadMejora, aspectoPositivo, compromiso: compromiso.trim(),
        capacitacionDada, temaCapacitacion: capacitacionDada === "Si" ? temaCapacitacion.trim() : "",
        competencia: competencia.trim(),
        incidencias: incidencias.trim(),
        infraestructura: infraestructura.trim(),
        quejasClientes: incidencias.trim() ? "Si" : "No",
        descripcionQuejas: incidencias.trim(),
        problemaSeguridad: infraestructura.trim() ? "Si" : "No",
        descripcionProblema: infraestructura.trim(),
        quejasResueltas: false, infraResuelta: false,
      };
      const tareasActualizadas = data.tareas.map((t) => {
        if (checkedDone[t.id]) return { ...t, hecha: true };
        return t;
      });
      // Marcar quejas/infra resueltas en visita anterior
      const visitasActualizadas = data.visitas.map((v) => {
        const visitasDelLocal = data.visitas.filter((x) => x.localId === localId).sort((a,b) => a.fecha < b.fecha ? 1 : -1);
        const ultima = visitasDelLocal[0];
        // Marcar visita última
        if (ultima && v.id === ultima.id) {
          return { ...v, quejasResueltas: quejasResueltasCheck ? true : v.quejasResueltas, infraResuelta: infraResueltaCheck ? true : v.infraResuelta };
        }
        // Marcar visitas históricas tildadas
        if (infraChecks[v.id]) return { ...v, infraResuelta: true };
        if (quejasChecks[v.id]) return { ...v, quejasResueltas: true };
        return v;
      });
      const tareasNuevas = compromiso.trim() ? [{ id: uid(), localId, texto: compromiso.trim(), hecha: false, fecha: todayISO() }] : [];
      const codigosActualizados = (data.codigos || []).map((c) => {
        const r = resultadosCodigos[c.id];
        if (!r?.estado) return c;
        return { ...c, probado: true, resultado: r.estado === "Si" ? "Funciona" : "No funciona", detalleFalla: r.detalle || "", fechaProbado: todayISO() };
      });
      // Si es local adicional (no precargado desde ruta), crear entrada de ruta adicional
      let rutasActualizadas = data.rutas || [];
      if (esAdicional) {
        const rutaAdicional = { id: uid(), supervisor: supervisor.trim(), fecha: todayISO(), localIds: [localId], creadaEn: todayISO(), esAdicional: true };
        rutasActualizadas = [...rutasActualizadas, rutaAdicional];
      }
      await onSave({ ...data, visitas: [...visitasActualizadas, visita], tareas: [...tareasActualizadas, ...tareasNuevas], codigos: codigosActualizados, rutas: rutasActualizadas });
      resetForm();
      setGuardado(true);
      onDone(`Recorrido a "${selectedLocal.nombre}" guardado correctamente.`);
    } finally { setSaving(false); }
  };

  // YesNo con acción correctiva

  return (
    <div className="form-page">
      {guardado && (
        <div className="panel" style={{ borderColor:"var(--done)", background:"#f0faf5", marginBottom:16 }}>
          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
            <span style={{ fontSize:20 }}>✓</span>
            <div>
              <div style={{ fontWeight:600, color:"var(--done)" }}>Recorrido guardado correctamente</div>
              <div style={{ fontSize:13, color:"#4b6858", marginTop:2 }}>Podés cargar otro recorrido seleccionando un nuevo local.</div>
            </div>
          </div>
        </div>
      )}

      {!localId ? (
        <div className="panel">
          <div className="panel-title">Marcá el local</div>
          {esAdicional ? (
            <>
              <input className="input" placeholder="Buscar local por nombre o número…"
                value={searchAdicional} onChange={(e) => setSearchAdicional(e.target.value)} />
              {searchAdicional.length > 0 && (
                <div className="search-results">
                  {LOCALES_FIJOS.filter((n) => n.toLowerCase().includes(searchAdicional.toLowerCase())).slice(0, 8).map((nombre) => (
                    <button key={nombre} className="search-item" onClick={async () => {
                      let local = data.locales.find((l) => l.nombre.toLowerCase() === nombre.toLowerCase());
                      let newLocales = data.locales;
                      if (!local) {
                        local = { id: uid(), nombre };
                        newLocales = [...data.locales, local];
                        await onSave({ ...data, locales: newLocales });
                      }
                      setLocalId(local.id);
                      setSearchAdicional("");
                      setCambiando(false);
                      const ahora = new Date();
                      setHoraLlegada(ahora.toLocaleTimeString("es-ES", { hour:"2-digit", minute:"2-digit" }));
                    }}>{nombre}</button>
                  ))}
                </div>
              )}
            </>
          ) : (
            <div style={{ textAlign:"center", padding:"20px 0" }}>
              <div style={{ fontSize:32, marginBottom:8 }}>📍</div>
              <div className="dim" style={{ fontSize:13 }}>Seleccioná un local desde "Mi ruta" para iniciar el recorrido.</div>
            </div>
          )}
        </div>
      ) : (
        <>
          {/* Local marcado */}
          <div className="panel selected-local">
            <div>
              <div className="panel-title">Local</div>
              <div className="local-name">{selectedLocal?.nombre}</div>
              {horaLlegada && <div style={{ marginTop:4 }}><span className="gps-tag">🕐 Llegada: {horaLlegada}</span></div>}
            </div>

          </div>

          {/* Resumen última visita */}
          <div className="panel" style={{ borderColor:"var(--pending)" }}>
            <div className="panel-title">Resumen de la última visita</div>
            {ultimaVisita ? (
              <div className="uv-compact-grid">
                <div className="uv-compact-item"><span className="uv-label">Fecha</span><span>{fmt(ultimaVisita.fecha)}{ultimaVisita.horaLlegada ? ` · ${ultimaVisita.horaLlegada}` : ""}</span></div>

  const tareasPend = tareasLocal.filter((t) => !t.hecha);
  const tareasHechas = tareasLocal.filter((t) => t.hecha);

  const quejas = vsLocal.filter((v) => v.quejasClientes === "Si");
  const infras = vsLocal.filter((v) => v.problemaSeguridad === "Si");

                <div className="det-info">

                  <div className="mono dim small">desde {fmt(t.fecha)}</div>
                </div>
              </div>

            <div className="panel-title">Tareas resueltas ({tareasHechas.length})</div>

                <span className="det-dot done"/>

                  <div className="mono dim small">desde {fmt(t.fecha)}</div>

            {quejas.map((v) => (

                <span className={"det-dot " + (v.quejasResueltas ? "done" : "alert")}/>
                <div className="det-info">
                  <div>{v.descripcionQuejas}</div>
                  <div className="mono dim small">{fmt(v.fecha)} · {v.quejasResueltas ? "Resuelta" : "Pendiente"}</div>
                </div>
              </div>
            ))}
          </div>
        )}

        {infras.length > 0 && (
          <div className="panel" style={{ borderLeft:"4px solid var(--pending)" }}>
            <div className="panel-title" style={{ color:"var(--pending)" }}>Problemas de infraestructura</div>
            {infras.map((v) => (
              <div key={v.id} className="det-item">
                <span className={"det-dot " + (v.infraResuelta ? "done" : "alert")}/>
                <div className="det-info">
                  <div>{v.descripcionProblema}</div>
                  <div className="mono dim small">{fmt(v.fecha)} · {v.infraResuelta ? "Resuelto" : "Pendiente"}</div>
                </div>
              </div>
            ))}

        {obsComerciales.length > 0 && (
          <div className="panel">
            <div className="panel-title">Observaciones comerciales</div>

              <div key={v.id} className="det-item">

                <div className="det-info">
                  <div>{v.observacionComercial}</div>

                </div>

          {[...locales].sort((a,b) => a.nombre.localeCompare(b.nombre)).map((l) => {
            const vs = visitas.filter((v) => v.localId === l.id);
            const p = tareas.filter((t) => t.localId === l.id && !t.hecha).length;

            return (
              <div className="table-row clickable" key={l.id} onClick={() => setSelLocal(l.id)}>

                <div className="mono" style={alertas>0?{ color:"var(--alert)" }:undefined}>{alertas || "—"}</div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ---- Historial ---- */
function Historial({ data, supervisorFijo }) {
  const { locales, visitas } = data;
  const [filtro, setFiltro] = useState("");
  const [mesFiltro, setMesFiltro] = useState(() => todayISO().slice(0,7));
  const [open, setOpen] = useState(null);

  const precioCombustible = data.precioCombustible || 6860;

  const mesesDisponibles = useMemo(() => {
    const set = new Set(visitas.map((v) => v.fecha?.slice(0,7)).filter(Boolean));
    return [...set].sort().reverse();
  }, [visitas]);

  const nombreMes = (ym) => {
    if (!ym) return "Todos";
    const [y,m] = ym.split("-");
    return ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"][parseInt(m)-1]+" "+y;
  };

  const localName = (id) => locales.find((l) => l.id === id)?.nombre || id;

  const filtradas = useMemo(() => {
    let list = [...visitas].sort((a,b) => (a.fecha < b.fecha ? 1 : -1));
    if (supervisorFijo) list = list.filter((v) => v.supervisor === supervisorFijo);
    if (mesFiltro) list = list.filter((v) => v.fecha?.startsWith(mesFiltro));
    if (!filtro.trim()) return list;
    const f = filtro.toLowerCase();
    return list.filter((v) => localName(v.localId).toLowerCase().includes(f) || (v.supervisor||"").toLowerCase().includes(f));
  }, [visitas, filtro, mesFiltro, locales, supervisorFijo]);

  // Resumen de km y monto por supervisor del mes
  const resumenKm = useMemo(() => {
    const map = {};
    const porSupDia = {};
    // Ordenar por fecha+hora para tomar el ÚLTIMO recorrido del día (el más completo)
    const filtradas_ord = [...filtradas].sort((a,b) => {
      const fa = (a.fecha||"") + (a.horaLlegada||"");
      const fb = (b.fecha||"") + (b.horaLlegada||"");
      return fa < fb ? -1 : 1;
    });
    filtradas_ord.forEach((v) => {
      const sup = v.supervisor || "Sin asignar";
      const dia = v.fecha || "";
      const key = sup + "|" + dia;
      // Tomar siempre el último (mayor índice en el array ordenado)
      porSupDia[key] = { sup, dia, kmNeto: v.kmRecorridos || 0, kmBruto: v.kmBruto || 0 };
    });
    Object.values(porSupDia).forEach(({ sup, kmNeto, kmBruto }) => {
      if (!map[sup]) map[sup] = { kmNeto: 0, kmBruto: 0, dias: 0 };
      map[sup].kmNeto += kmNeto;
      map[sup].kmBruto += kmBruto;
      map[sup].dias++;
    });
    const visitasPorSup = {};
    filtradas.forEach((v) => {
      const sup = v.supervisor || "Sin asignar";
      visitasPorSup[sup] = (visitasPorSup[sup] || 0) + 1;
    });
    return Object.entries(map).map(([sup, d]) => ({
      sup,

/* ---- CambiarPass ---- */
function CambiarPass({ usuario, onClose, onSave }) {
  const [actual, setActual] = useState("");
  const [nueva, setNueva] = useState("");
  const [confirmar, setConfirmar] = useState("");
  const [error, setError] = useState("");

  const guardar = () => {
    if (actual !== USUARIOS[usuario].passHash) { setError("Contraseña actual incorrecta."); return; }
    if (nueva.length < 4) { setError("La nueva contraseña debe tener al menos 4 caracteres."); return; }
    if (nueva !== confirmar) { setError("Las contraseñas no coinciden."); return; }
    USUARIOS[usuario].passHash = nueva;
    localStorage.setItem("pass_" + usuario, nueva);
    onSave();
    onClose();
  };

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.4)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:999 }}>
      <div className="panel" style={{ width:"100%", maxWidth:340, margin:20 }}>
        <div style={{ fontWeight:700, marginBottom:16 }}>Cambiar contraseña</div>
        <label className="field" style={{ marginBottom:8 }}><span>Contraseña actual</span><input className="input" type="password" value={actual} onChange={(e) => setActual(e.target.value)} /></label>
        <label className="field" style={{ marginBottom:8 }}><span>Nueva contraseña</span><input className="input" type="password" value={nueva} onChange={(e) => setNueva(e.target.value)} /></label>
        <label className="field" style={{ marginBottom:12 }}><span>Confirmar nueva</span><input className="input" type="password" value={confirmar} onChange={(e) => setConfirmar(e.target.value)} /></label>
        {error && <div style={{ color:"var(--alert)", fontSize:13, marginBottom:10 }}>{error}</div>}
        <div style={{ display:"flex", gap:8 }}>
          <button className="btn" onClick={onClose}>Cancelar</button>
          <button className="btn primary" onClick={guardar}>Guardar</button>
        </div>
      </div>
    </div>
  );
}

/* ---- App ---- */
function App() {
  const [sesion, setSesion] = useState(() => {
    try { return JSON.parse(sessionStorage.getItem("sesion") || "null"); } catch { return null; }
  });
  const [data, setData] = useState(EMPTY);
  const [ready, setReady] = useState(false);
  const [tab, setTab] = useState(() => sesion?.rol === "supervisor" ? "ruta" : "dashboard");
  const [toast, setToast] = useState(null);
  const [isDark, setIsDark] = useState(() => localStorage.getItem("dark") === "1");
  const toggleDark = () => setIsDark((d) => { localStorage.setItem("dark", d ? "0" : "1"); return !d; });
  const [localPrecargado, setLocalPrecargado] = useState(null);
  const [showCambiarPass, setShowCambiarPass] = useState(false);
  const irARecorrido = (localId) => { setLocalPrecargado(localId); setTab("nuevo"); };

  const handleLogin = (u) => {
    // Cargar contraseñas guardadas
    Object.keys(USUARIOS).forEach((k) => {
      const saved = localStorage.getItem("pass_" + k);
      if (saved) USUARIOS[k].passHash = saved;
    });
    setSesion(u);
    sessionStorage.setItem("sesion", JSON.stringify(u));
    setTab(u.rol === "supervisor" ? "ruta" : "dashboard");
  };

  const handleLogout = () => {
    setSesion(null);
    sessionStorage.removeItem("sesion");
    setTab("dashboard");
  };

  useEffect(() => {
    // Cargar contraseñas personalizadas
    Object.keys(USUARIOS).forEach((k) => {
      const saved = localStorage.getItem("pass_" + k);
      if (saved) USUARIOS[k].passHash = saved;
    });
    if (sesion) loadData().then((d) => { setData(d); setReady(true); });
  }, [sesion]);

  if (!sesion) return <Login onLogin={handleLogin} />;

  const handleSave = async (next) => {
    const prev = data;
    setData(next);
    try {
      await saveData(prev, next);
    } catch (err) {
      console.warn("Firebase save error:", err);
      // Si falla Firebase (ej: archivo abierto localmente), igual muestra el resultado en pantalla
    }
  };

  const showToast = (msg, kind = "done") => {
    setToast({ msg, kind });
    setTimeout(() => setToast(null), 3500);
  };

  return (
    <div className={"app" + (isDark ? " dark" : "")}>
      <Style />
      <header className="topbar">
        <div className="brand">
          <span className="brand-mark"/>
          <div>
            <div className="brand-title">Recorridos</div>
            <div className="brand-sub">Supervisión comercial de locales</div>
          </div>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
          <span style={{ fontSize:13, color:"#6B7268" }}>{sesion.nombre}</span>
          <button className="dark-toggle" onClick={() => setShowCambiarPass(true)} title="Cambiar contraseña" style={{ fontSize:13 }}>🔑</button>
          <button className="dark-toggle" onClick={toggleDark} title="Modo oscuro">{isDark ? "☀️" : "🌙"}</button>
          <button className="dark-toggle" onClick={handleLogout} title="Salir" style={{ fontSize:13 }}>⬡ Salir</button>
        </div>
        <nav className="tabs">
          {(sesion.rol === "supervisor"
              ? [["ruta","Mi ruta"],["historial","Historial"]]
              : [["dashboard","Panel"],["locales","Locales"],["historial","Historial"],["ruta","Mi ruta"],["admin","Administración"]]
            ).map(([id,label]) => (
            <button key={id} className={"tab"+(tab===id?" active":"")} onClick={() => setTab(id)}>{label}</button>
          ))}
        </nav>
      </header>
      <main className="content">
        {!ready ? <div className="loading">Cargando…</div>
          : tab==="dashboard" ? <Dashboard data={data} />
          : tab==="locales" ? <Locales data={data} onSave={handleSave} showToast={showToast} />
          : tab==="historial" ? <Historial data={data} supervisorFijo={sesion.rol==="supervisor" ? sesion.supervisor : null} />
          : tab==="ruta" ? <MiRuta data={data} irARecorrido={irARecorrido} onSave={handleSave} showToast={showToast} supervisorFijo={sesion.rol==="supervisor" ? sesion.supervisor : null} />
          : <Admin data={data} onSave={handleSave} showToast={showToast} />
        }
      </main>
      {toast && <div className={"toast "+toast.kind}>{toast.msg}</div>}
      {showCambiarPass && (
        <CambiarPass
          usuario={Object.keys(USUARIOS).find((k) => USUARIOS[k].nombre === sesion.nombre) || "admin"}
          onClose={() => setShowCambiarPass(false)}
          onSave={() => showToast("Contraseña actualizada.")}
        />
      )}
    </div>
  );
}

/* ---- BorrarRutas ---- */
function BorrarRutas({ data, onSave, showToast }) {
  const { rutas } = data;
  const [supervisor, setSupervisor] = useState("");
  const [mes, setMes] = useState("");

  const mesesDisp = useMemo(() => {
    const set = new Set((rutas||[]).map((r) => r.fecha?.slice(0,7)).filter(Boolean));
    return [...set].sort().reverse();
  }, [rutas]);

  const borrar = async () => {
    if (!mes) return;
    const filtradas = (rutas||[]).filter((r) => {
      const mismoMes = r.fecha?.startsWith(mes);
      const mismoSup = !supervisor || r.supervisor === supervisor;
      return !(mismoMes && mismoSup);
    });
    const borradas = (rutas||[]).length - filtradas.length;
    await onSave({ ...data, rutas: filtradas });
    showToast(`${borradas} asignación(es) eliminadas.`);
    setMes(""); setSupervisor("");
  };

  const nombreMes = (ym) => {
    if (!ym) return "";
    const [y,m] = ym.split("-");
    return ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"][parseInt(m)-1]+" "+y;
  };

  return (
    <div>
      <div className="field-grid">
        <label className="field">
          <span>Mes a borrar</span>
          <select className="input" value={mes} onChange={(e) => setMes(e.target.value)}>
            <option value="">— Elegí el mes —</option>
            {mesesDisp.map((m) => <option key={m} value={m}>{nombreMes(m)}</option>)}
          </select>
        </label>
        <label className="field">
          <span>Supervisor (opcional)</span>
          <select className="input" value={supervisor} onChange={(e) => setSupervisor(e.target.value)}>
            <option value="">Todos</option>
            <option value="Ernesto Aguero">Ernesto Aguero</option>
            <option value="Alexis Arzamendia">Alexis Arzamendia</option>
          </select>
        </label>
      </div>
      <button className="btn" style={{ borderColor:"var(--alert)", color:"var(--alert)" }}
        disabled={!mes} onClick={borrar}>
        Borrar rutas del mes
      </button>
    </div>
  );
}

/* ---- RutaForm ---- */
function RutaForm({ data, onSave, showToast }) {
  const { locales } = data;
  const [supervisor, setSupervisor] = useState("");
  const [fecha, setFecha] = useState(todayISO());
  const [search, setSearch] = useState("");
  const [nombresSelec, setNombresSelec] = useState([]);
  const [saving, setSaving] = useState(false);

  const mesActual = fecha ? fecha.slice(0,7) : todayISO().slice(0,7);

  // Locales de la zona del supervisor seleccionado
  const localesZona = useMemo(() => {
    if (!supervisor) return [];
    const zona = supervisor.includes("Ernesto") ? ZONA_SUP1 : ZONA_SUP2;
    return LOCALES_FIJOS.filter((n) => {
      const num = parseInt(n.split(" - ")[0].trim());
      return zona.includes(num);
    });
  }, [supervisor]);

  // Locales filtrados por búsqueda
  const localesFiltrados = useMemo(() => {
    if (!search) return localesZona;
    return localesZona.filter((n) => n.toLowerCase().includes(search.toLowerCase()));
  }, [localesZona, search]);

  // Separar en disponibles y seleccionados
  const disponibles = localesFiltrados.filter((n) => !nombresSelec.includes(n));
  const seleccionados = localesFiltrados.filter((n) => nombresSelec.includes(n));

  const toggleLocal = (nombre) => {
    setNombresSelec((prev) =>
      prev.includes(nombre) ? prev.filter((n) => n !== nombre) : [...prev, nombre]
    );
  };

  // Verificar si ya tiene recorrido en el mes
  const tieneRecorrido = (nombre) => {
    const localObj = locales.find((l) => l.nombre.toLowerCase() === nombre.toLowerCase());
    return localObj && data.visitas.some((v) => v.localId === localObj.id && v.fecha?.startsWith(mesActual));
  };

  // Verificar si ya está en ruta del mes
  const estaEnRuta = (nombre) => {
    const localObj = locales.find((l) => l.nombre.toLowerCase() === nombre.toLowerCase());
    return localObj && (data.rutas||[]).some((r) =>
      r.fecha?.startsWith(mesActual) && r.localIds?.includes(localObj.id)
    );
  };

  const guardar = async () => {
    if (!supervisor || !fecha || nombresSelec.length === 0) return;
    setSaving(true);
    try {
      let localesAct = [...data.locales];
      const idsResueltos = nombresSelec.map((nombre) => {
        let local = localesAct.find((l) => l.nombre.toLowerCase() === nombre.toLowerCase());
        if (!local) { local = { id: uid(), nombre }; localesAct.push(local); }
        return local.id;
      });
      const nueva = { id: uid(), supervisor, fecha, localIds: idsResueltos, creadaEn: todayISO() };
      await onSave({ ...data, locales: localesAct, rutas: [...(data.rutas||[]), nueva] });
      showToast(`${nombresSelec.length} locales asignados a ${supervisor.split(" ")[0]} para el ${fmt(fecha)}.`);
      setNombresSelec([]); setSearch("");
    } finally { setSaving(false); }
  };

  return (
    <div>
      <div className="field-grid">
        <label className="field">
          <span>Supervisor</span>
          <select className="input" value={supervisor} onChange={(e) => { setSupervisor(e.target.value); setNombresSelec([]); }}>

        </label>

                  const visitado = tieneRecorrido(nombre);
                  const enRuta = estaEnRuta(nombre);
                  return (
                    <div key={nombre}
                      className={"ruta-local-item" + (selec ? " ya-selec" : "") + (visitado ? " visitado" : "")}
                      onClick={() => toggleLocal(nombre)}>

                    </div>
                  );
                })}
              </div>
            </div>

            {/* Columna derecha: asignados en el mes con estado */}
            <div className="ruta-col">
              <div className="ruta-col-titulo" style={{ color: supervisor.includes("Ernesto") ? "var(--route)" : "var(--pending)" }}>
                {supervisor.includes("Ernesto") ? "Zona Ernesto" : "Zona Alexis"} — Este mes
              </div>
              <div className="ruta-col-lista">
                {localesZona.filter((nombre) => {
                  const localObj = locales.find((l) => l.nombre.toLowerCase() === nombre.toLowerCase());
                  return localObj && (data.rutas||[]).some((r) => r.fecha?.startsWith(mesActual) && r.localIds?.includes(localObj.id));
                }).map((nombre) => {
                  const localObj = locales.find((l) => l.nombre.toLowerCase() === nombre.toLowerCase());
                  const visitado = tieneRecorrido(nombre);
                  const esAdicional = (data.rutas||[]).some((r) =>
                    r.fecha?.startsWith(mesActual) && r.localIds?.includes(localObj?.id) && r.esAdicional
                  );
                  return (
                    <div key={nombre}
                      className={"ruta-local-item " + (supervisor.includes("Ernesto") ? "sel-sup1" : "sel-sup2")}
                      onClick={() => toggleLocal(nombre)}>
                      <span className="ruta-local-nombre">{nombre}</span>
                      {visitado
                        ? <span className="ruta-tag-mini visited">{esAdicional ? "✓ adicional" : "✓ visitado"}</span>
                        : <span className="ruta-tag-mini en-ruta">en ruta</span>}
                    </div>
                  );
                })}
                {localesZona.filter((nombre) => {
                  const localObj = locales.find((l) => l.nombre.toLowerCase() === nombre.toLowerCase());
                  return localObj && (data.rutas||[]).some((r) => r.fecha?.startsWith(mesActual) && r.localIds?.includes(localObj.id));
                }).length === 0 && <div className="dim small" style={{ padding:8 }}>Sin locales asignados este mes</div>}
              </div>
            </div>
          </div>

          <button className="btn primary" style={{ marginTop:10 }}
            disabled={nombresSelec.length === 0 || saving}
            onClick={guardar}>
            {saving ? "Guardando…" : `Asignar ${nombresSelec.length} locales para el ${fmt(fecha)}`}
          </button>
        </>
      )}
    </div>
  );
}


/* ---- Mi Ruta ---- */
function MiRuta({ data, irARecorrido, onSave, showToast, supervisorFijo }) {
  const { locales, visitas, rutas } = data;
  const [supervisor, setSupervisor] = useState(supervisorFijo || "");
  const [localActivo, setLocalActivo] = useState(null);
  const [mostrarAdicional, setMostrarAdicional] = useState(false);

  const localName = (id) => locales.find((l) => l.id === id)?.nombre || id;

  const rutasDelSup = useMemo(() => {
    if (!supervisor) return [];
    return [...(rutas||[]).filter((r) => r.supervisor === supervisor)]
      .sort((a, b) => (a.fecha < b.fecha ? -1 : 1));
  }, [rutas, supervisor]);

  const diasAgrupados = useMemo(() => {
    const map = {};
    rutasDelSup.forEach((r) => {
      if (!map[r.fecha]) map[r.fecha] = [];
      map[r.fecha].push(...r.localIds);
    });
    return Object.entries(map).sort(([a],[b]) => a < b ? -1 : 1);
  }, [rutasDelSup]);

  const visitasPorLocal = useMemo(() => {
    if (!supervisor) return {};
    const map = {};
    visitas.filter((v) => v.supervisor === supervisor).forEach((v) => {
      if (!map[v.localId]) map[v.localId] = [];
      map[v.localId].push(v.fecha);
    });
    return map;
  }, [visitas, supervisor]);

  const totalLocales = diasAgrupados.reduce((acc, [, ids]) => acc + ids.length, 0);
  const visitados = diasAgrupados.reduce((acc, [, ids]) => {
    return acc + ids.filter((id) => !!(visitasPorLocal[id]?.length > 0)).length;
  }, 0);

  // Cuando hay encuesta abierta, mostrar solo la encuesta
  const enEncuesta = localActivo || mostrarAdicional;

  return (
    <div className="form-page">

      {/* Header: título + botón local adicional arriba a la izquierda */}
      {!enEncuesta && (
        <div className="ruta-header">
          <h2 className="page-title" style={{ margin:0 }}>Mi ruta</h2>
          {supervisor && (
            <button className="btn" onClick={() => setMostrarAdicional(true)}>+ Local adicional</button>
          )}
        </div>
      )}

      {/* Si hay encuesta abierta, mostrar solo la encuesta con botón volver */}
      {enEncuesta ? (
        <div>
          <button className="btn ghost" style={{ marginBottom:12 }} onClick={() => { setLocalActivo(null); setMostrarAdicional(false); }}>
            ← Volver a mi ruta
          </button>
          <NuevoRecorrido
            data={data}
            onSave={onSave}
            localPrecargado={localActivo}
            esAdicional={mostrarAdicional}
            supervisorFijo={supervisorFijo}
            onDone={(m) => {
              showToast(m);
              setLocalActivo(null);
              setMostrarAdicional(false);
            }}
          />
        </div>
      ) : (
        <>
          {/* Selector de supervisor */}
          {!supervisorFijo && (
            <div className="panel">
              <div className="panel-title">Supervisor</div>
              <select className="input" value={supervisor} onChange={(e) => setSupervisor(e.target.value)}>
                <option value="">— Seleccioná tu nombre —</option>
                <option value="Ernesto Aguero">Ernesto Aguero — Sup1</option>
                <option value="Alexis Arzamendia">Alexis Arzamendia — Sup2</option>
              </select>
            </div>
          )}

          {supervisor && diasAgrupados.length === 0 && (
            <div className="empty-hero small"><p>No tenés locales asignados todavía.</p></div>
          )}

          {diasAgrupados.length > 0 && (
            <>
              <div className="panel" style={{ borderTop:"3px solid var(--route)" }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:10 }}>
                  <div>
                    <div style={{ fontWeight:600 }}>{visitados} de {totalLocales} locales visitados</div>
                    <div className="dim small">{diasAgrupados.length} días asignados</div>
                  </div>
                  <div className="ruta-progress">
                    <div className="ruta-progress-bar" style={{ width:`${totalLocales > 0 ? (visitados/totalLocales)*100 : 0}%` }} />
                  </div>
                </div>
              </div>

              {diasAgrupados.map(([fecha, localIds]) => {
                const completadosHoy = localIds.filter((id) => !!(visitasPorLocal[id]?.length > 0)).length;
                const todoListo = completadosHoy === localIds.length;
                return (
                  <div key={fecha} className="dia-panel">
                    <div className="dia-header">
                      <div>
                        <div className="dia-fecha">{fmt(fecha)}</div>
                        <div className="dim small">{completadosHoy}/{localIds.length} completados</div>
                      </div>
                      {todoListo && <span className="badge" style={{ color:"var(--done)", borderColor:"var(--done)" }}>✓ Día completo</span>}
                    </div>
                    <div className="ruta-grid">
                      {localIds.map((id) => {
                        const visitado = !!(visitasPorLocal[id]?.length > 0);
                        return (
                          <div key={id}
                            className={"ruta-card " + (visitado ? "ruta-ok" : "ruta-pendiente") + (!visitado ? " ruta-clickable" : "")}
                            onClick={!visitado ? () => setLocalActivo(id) : undefined}>
                            <div className="ruta-estado">{visitado ? "✓" : "+"}</div>
                            <div className="ruta-info">
                              <div className="ruta-nombre">{localName(id)}</div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </>
          )}
        </>
      )}
    </div>
  );
}
